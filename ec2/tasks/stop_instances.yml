---
- name: Get instance details by name tag
  amazon.aws.ec2_instance_info:
    region: "{{ aws_region }}"
    filters:
      "tag:Name": "{{ item.name }}"
      instance-state-name:
        - running
  loop: "{{ ec2_instances }}"
  register: ec2_info

- name: Stop EC2 instances
  amazon.aws.ec2_instance:
    instance_ids:
      - "{{ item.instances[0].instance_id }}"
    state: stopped
    region: "{{ aws_region }}"
    wait: true
  loop: "{{ ec2_info.results }}"
  when: item.instances | length > 0

- name: Display stopped instances info
  debug:
    msg:
      - "Instances Name: {{ item.item.name }}"
      - "Instance ID: {{ item.instances[0].instance_id }}"
      - "State: Stopped"
  loop: "{{ ec2_info.results }}"
  when: item.instances | length > 0
